name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pip install pytest
          pytest tests/ -v

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name "TankBattle" --console main.py

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist/TankBattle.exe -DestinationPath TankBattle-Windows-x86_64.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TankBattle-Windows-x86_64
          path: |
            TankBattle-Windows-x86_64.zip
            dist/TankBattle.exe

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name "TankBattle" --console main.py

      - name: Create tar.gz archive
        run: |
          tar -czvf TankBattle-Linux-x86_64.tar.gz -C dist TankBattle

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TankBattle-Linux-x86_64
          path: |
            TankBattle-Linux-x86_64.tar.gz
            dist/TankBattle

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name "TankBattle" --console main.py

      - name: Create tar.gz archive
        run: |
          tar -czvf TankBattle-macOS-x86_64.tar.gz -C dist TankBattle

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TankBattle-macOS-x86_64
          path: |
            TankBattle-macOS-x86_64.tar.gz
            dist/TankBattle

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: TankBattle-Windows-x86_64
          path: ./release

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: TankBattle-Linux-x86_64
          path: ./release

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: TankBattle-macOS-x86_64
          path: ./release

      - name: Organize release files
        run: |
          mkdir -p ./release/final
          mv ./release/TankBattle-Windows-x86_64.zip ./release/final/
          mv ./release/TankBattle-Linux-x86_64.tar.gz ./release/final/
          mv ./release/TankBattle-macOS-x86_64.tar.gz ./release/final/

      - name: Generate checksums
        run: |
          cd ./release/final
          sha256sum TankBattle-Windows-x86_64.zip > checksums.txt
          sha256sum TankBattle-Linux-x86_64.tar.gz >> checksums.txt
          sha256sum TankBattle-macOS-x86_64.tar.gz >> checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/final/TankBattle-Windows-x86_64.zip
            ./release/final/TankBattle-Linux-x86_64.tar.gz
            ./release/final/TankBattle-macOS-x86_64.tar.gz
            ./release/final/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
