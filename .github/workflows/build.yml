name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pip install pytest
          pytest tests/ -v

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name "TankBattle" --console main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TankBattle-Windows-x86_64
          path: dist/TankBattle.exe

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name "TankBattle-Linux" --console main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TankBattle-Linux-x86_64
          path: dist/TankBattle-Linux

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --name "TankBattle-macOS" --console main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TankBattle-macOS-x86_64
          path: dist/TankBattle-macOS

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: TankBattle-Windows-x86_64
          path: ./release

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: TankBattle-Linux-x86_64
          path: ./release

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: TankBattle-macOS-x86_64
          path: ./release

      - name: Generate checksums
        run: |
          cd ./release
          sha256sum TankBattle.exe > checksums.txt
          sha256sum TankBattle-Linux >> checksums.txt
          sha256sum TankBattle-macOS >> checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/TankBattle.exe
            ./release/TankBattle-Linux
            ./release/TankBattle-macOS
            ./release/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
