name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pip install pytest
          pytest tests/ -v

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download Chinese font
        run: |
          # 下载思源黑体用于 Windows 打包 (使用多个源确保可靠性)
          $fontPath = "assets\fonts\SourceHanSansSC-Regular.otf"
          if (!(Test-Path "assets\fonts")) {
            New-Item -ItemType Directory -Force -Path "assets\fonts"
          }

          # 备用源列表
          $fontUrls = @(
            "https://github.com/googlefonts/noto-cjk/raw/main/SourceHanSansSC-Regular.otf",
            "https://raw.githubusercontent.com/googlefonts/noto-cjk/main/SourceHanSansSC-Regular.otf",
            "https://cdn.jsdelivr.net/gh/googlefonts/noto-cjk@main/SourceHanSansSC-Regular.otf",
            "https://ghproxy.com/https://raw.githubusercontent.com/googlefonts/noto-cjk/main/SourceHanSansSC-Regular.otf"
          )

          $downloaded = $false
          foreach ($url in $fontUrls) {
            try {
              Write-Host "Trying to download font from: $url"
              Invoke-WebRequest -Uri $url -OutFile $fontPath -TimeoutSec 30
              if (Test-Path $fontPath) {
                Write-Host "Font downloaded successfully from: $url"
                $downloaded = $true
                break
              }
            } catch {
              Write-Host "Failed to download from: $url"
            }
          }

          if (-not $downloaded) {
            Write-Host "Font download failed from all sources, will use system fonts"
            Write-Host "The UI code has fallback mechanism to use system Chinese fonts"
          }
        shell: pwsh

      - name: Build executable with spec file
        run: |
          pyinstaller --clean build.spec

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path dist/TankBattle.exe -DestinationPath TankBattle-Windows-x86_64.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TankBattle-Windows-x86_64
          path: |
            TankBattle-Windows-x86_64.zip
            dist/TankBattle.exe

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download Chinese font
        run: |
          # 下载思源黑体 (使用多个源确保可靠性)
          mkdir -p assets/fonts
          FONT_PATH="assets/fonts/SourceHanSansSC-Regular.otf"

          # 备用源列表
          FONT_URLS=(
            "https://github.com/googlefonts/noto-cjk/raw/main/SourceHanSansSC-Regular.otf"
            "https://raw.githubusercontent.com/googlefonts/noto-cjk/main/SourceHanSansSC-Regular.otf"
            "https://cdn.jsdelivr.net/gh/googlefonts/noto-cjk@main/SourceHanSansSC-Regular.otf"
          )

          downloaded=false
          for url in "${FONT_URLS[@]}"; do
            echo "Trying to download font from: $url"
            if curl -L -o "$FONT_PATH" "$url" --max-time 30 --silent; then
              if [ -f "$FONT_PATH" ] && [ -s "$FONT_PATH" ]; then
                echo "Font downloaded successfully from: $url"
                downloaded=true
                break
              fi
            fi
            echo "Failed to download from: $url"
          done

          if [ "$downloaded" = false ]; then
            echo "Font download failed from all sources, will use system fonts"
            echo "The UI code has fallback mechanism to use system Chinese fonts"
          fi

      - name: Build executable with spec file
        run: |
          pyinstaller --clean build.spec

      - name: Create tar.gz archive
        run: |
          tar -czvf TankBattle-Linux-x86_64.tar.gz -C dist TankBattle

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TankBattle-Linux-x86_64
          path: |
            TankBattle-Linux-x86_64.tar.gz
            dist/TankBattle

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download Chinese font
        run: |
          # 下载思源黑体 (使用多个源确保可靠性)
          mkdir -p assets/fonts
          FONT_PATH="assets/fonts/SourceHanSansSC-Regular.otf"

          # 备用源列表
          FONT_URLS=(
            "https://github.com/googlefonts/noto-cjk/raw/main/SourceHanSansSC-Regular.otf"
            "https://raw.githubusercontent.com/googlefonts/noto-cjk/main/SourceHanSansSC-Regular.otf"
            "https://cdn.jsdelivr.net/gh/googlefonts/noto-cjk@main/SourceHanSansSC-Regular.otf"
          )

          downloaded=false
          for url in "${FONT_URLS[@]}"; do
            echo "Trying to download font from: $url"
            if curl -L -o "$FONT_PATH" "$url" --max-time 30 --silent; then
              if [ -f "$FONT_PATH" ] && [ -s "$FONT_PATH" ]; then
                echo "Font downloaded successfully from: $url"
                downloaded=true
                break
              fi
            fi
            echo "Failed to download from: $url"
          done

          if [ "$downloaded" = false ]; then
            echo "Font download failed from all sources, will use system fonts"
            echo "The UI code has fallback mechanism to use system Chinese fonts"
          fi

      - name: Build executable with spec file
        run: |
          pyinstaller --clean build.spec

      - name: Create tar.gz archive
        run: |
          tar -czvf TankBattle-macOS-x86_64.tar.gz -C dist TankBattle

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TankBattle-macOS-x86_64
          path: |
            TankBattle-macOS-x86_64.tar.gz
            dist/TankBattle

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: TankBattle-Windows-x86_64
          path: ./release

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: TankBattle-Linux-x86_64
          path: ./release

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: TankBattle-macOS-x86_64
          path: ./release

      - name: Organize release files
        run: |
          mkdir -p ./release/final
          mv ./release/TankBattle-Windows-x86_64.zip ./release/final/
          mv ./release/TankBattle-Linux-x86_64.tar.gz ./release/final/
          mv ./release/TankBattle-macOS-x86_64.tar.gz ./release/final/

      - name: Generate checksums
        run: |
          cd ./release/final
          sha256sum TankBattle-Windows-x86_64.zip > checksums.txt
          sha256sum TankBattle-Linux-x86_64.tar.gz >> checksums.txt
          sha256sum TankBattle-macOS-x86_64.tar.gz >> checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./release/final/TankBattle-Windows-x86_64.zip
            ./release/final/TankBattle-Linux-x86_64.tar.gz
            ./release/final/TankBattle-macOS-x86_64.tar.gz
            ./release/final/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
